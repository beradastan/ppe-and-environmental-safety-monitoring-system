backend:
  cors_origins:
  - http://localhost:5173
  - http://localhost:5174
  - http://127.0.0.1:5173
  - http://127.0.0.1:5174
  host: 0.0.0.0
  port: 5050
database:
  enabled: true
  host: localhost
  port: 5432
  name: ppe_db
  user: postgres
  password: "1234"
detection:
  fire_confidence: 0.5
  min_hits: 3
  person_confidence: 0.4
  ppe_confidence: 0.35
event_manager:
  fire_clear_frames: 10
  fire_confirm_frames: 20
  new_confirm_sec: 3.0
  resolved_confirm_sec: 5.0
llm:
  base_url: http://localhost:11434
  enabled: true
  model: hf.co/QuantFactory/Turkish-Llama-8b-DPO-v0.1-GGUF:Q4_K_M
  temperature: 0.1
  timeout: 120
models:
  device: auto
  person_model: models/person_agent_scene_vinayakstyle_best.pt
  helmet_model: models/bera/crophelmet_agent_final_best.pt
  vest_model: models/bera/vest_agent_final_best.pt
  mask_model: models/bera/cropmask_agent_final_best.pt
  fire_model: models/bera/fire_smoke_other_agent_final_best.pt
  mask_imgsz: 1280
ppe_pipeline:
  fire_conf: 0.5
  helmet_conf: 0.2
  mask_conf: 0.25
  new_confirm_sec: 3
  person_conf: 0.25
  resolved_confirm_sec: 5
  temporal_window: 30
  use_fire: true
  use_helmet: true
  use_mask: true
  use_vest: true
  vest_conf: 0.3
results_dir: results
results_keep_events: 50
