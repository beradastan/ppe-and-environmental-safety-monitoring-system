provider: berat
description: Kendi egitilen crop-based helmet detection agent

models:
  crophelmet:
    path: models/crophelmet_agent_final_best.pt
    description: Crop-based helmet agent - kisiye gore crop alinip helmet detect edilir
    agents:
      hardhat:
        classes: [Hardhat, NO-Hardhat]

person_models:
  nano:
    path: models/pretrained/person/person_yolov8n-seg.pt
    description: Lightweight person-only YOLOv8n segmentation model
  small:
    path: models/pretrained/person/person_yolov8s-seg.pt
    description: Stronger person-only YOLOv8s segmentation model

agents:
  person:
    classes: [person]
    conf: 0.25
  hardhat:
    classes: [Hardhat, NO-Hardhat]
    conf: 0.30

tracking:
  tracker: bytetrack.yaml
  device: 0
  imgsz: 640
  persist: true
  crop_padding: 0.30
  temporal_window: 10

display:
  width: 1280
  height: 720
